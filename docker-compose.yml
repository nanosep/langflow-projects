version: '3.8'

services:
  caddy:
    image: caddy:alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - langflow
    restart: unless-stopped

  langflow:
    image: langflowai/langflow:1.7.3
    platform: linux/amd64
    container_name: langflow
    expose:
      - "10000"
    volumes:
      - ./flows:/flows
      - langflow_data:/root/.langflow
      - uploads:/tmp/uploads
    environment:
      - LANGFLOW_LOAD_FLOWS_PATH=/flows
      - LANGFLOW_HOST=0.0.0.0
      - LANGFLOW_PORT=10000
      - LANGFLOW_AUTO_LOGIN=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  langflow_data:
  uploads:
  caddy_data:
